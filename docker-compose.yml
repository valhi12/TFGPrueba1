services:
  db:
    image: mysql:8.0
    container_name: tfg-db
    environment:
      MYSQL_DATABASE: tfg_db
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: tfg-adminer
    restart: always
    ports:
      - "8081:8080"